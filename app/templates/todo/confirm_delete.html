{% extends "base.html" %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
  <h2>Confirm Delete</h2>
  <p>Are you sure you want to delete the list <strong>{{ todo_list.name }}</strong>?</p>
  <form method="post" action="{{ url_for('main.confirm_delete_list', list_id=todo_list.id) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="btn delete-btn">Yes, delete</button>
    <a href="{{ url_for('main.todolists') }}" class="btn">Cancel</a>
  </form>
{% endblock %}
