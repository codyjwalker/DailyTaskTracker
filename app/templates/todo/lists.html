{% extends "base.html" %}
{% block title %}To‑Do Lists{% endblock %}

{% block content %}
<div class="container">
    <h1>To‑Do Lists</h1>
    {% if todo_lists %}
        <ul class="list-unstyled">
        {% for lst in todo_lists %}
            <li class="list-item">
                <a href="{{ url_for('main.todolist', list_id=lst.id) }}">{{ lst.name }}</a>
                <a href="{{ url_for('main.confirm_delete_list', list_id=lst.id) }}"
                   class="btn delete-btn btn-sm">Delete</a>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No to‑do lists yet.</p>
    {% endif %}

    <h2>Create New List</h2>
    <form action="{{ url_for('main.todolists') }}" method="post" class="mt-3">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="action" value="create">
        <div class="form-group">
            <label for="list-name">List name:</label>
            <input type="text" id="list-name" name="name" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary mt-2">Create List</button>
    </form>
</div>
{% endblock %}
