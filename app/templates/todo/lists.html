{% extends "base.html" %}

{% block title %}To‑Do Lists{% endblock %}

{% block content %}
<div class="container">
  <h2>To‑Do Lists</h2>
  <a href="{{ url_for('main.monthly') }}" class="btn">Back to Monthly Overview</a>

  <h3>Existing Lists</h3>
  {% if todo_lists %}
    {% for lst in todo_lists %}
      <div class="list-item">
        <a href="{{ url_for('main.todolist', list_id=lst.id) }}" class="btn">{{ lst.name }}</a>
        <form method="post" action="{{ url_for('main.confirm_delete_list', list_id=lst.id) }}" style="display:inline;">
			<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="btn delete-btn">Delete</button>
        </form>
      </div>
    {% endfor %}
  {% else %}
    <p>No to‑do lists yet.</p>
  {% endif %}

  <h3>Create New List</h3>
  <form method="post" action="{{ url_for('main.todolists') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label for="list_name">List name:</label>
      <input type="text" id="list_name" name="name" class="form-control" required>
    </div>
    <button type="submit" class="btn">Create List</button>
  </form>
</div>
{% endblock %}
