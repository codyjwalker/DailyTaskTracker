{% extends "base.html" %}
{% block title %}Daily Overview - {{ date }}{% endblock %}
{% block content %}
<h2>Daily Overview - {{ date }}</h2>

<form method="get" action="{{ url_for('daily') }}">
    <label for="date-select">Select date:</label>
    <input type="date" id="date-select" name="date" value="{{ date }}" onchange="this.form.submit()">
</form>

<form method="post" action="{{ url_for('daily', date=date) }}">
    <table class="task-table">
        <thead>
            <tr>
                <th>Task</th>
                <th>Completed</th>
            </tr>
        </thead>
        <tbody>
            {% for task in tasks %}
                <tr>
                    <td>{{ task }}</td>
                    <td>
                        <!-- Use loop.index0 as the zero‑based index -->
                        <input type="checkbox"
                               name="task_{{ loop.index0 }}"
                               id="task_{{ loop.index0 }}"
                               {% if statuses[task] %}checked{% endif %}>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
    <button type="submit">Save</button>
</form>

<p><a href="{{ url_for('monthly') }}">Back to Monthly Overview</a></p>
{% endblock %}
